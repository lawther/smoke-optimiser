name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Opt into Node.js 24 to address deprecation of Node.js 20 in GitHub Actions runners.
  # This workaround can be removed after June 2nd, 2026, when Node 24 becomes the default.
  # It MUST be removed before September 16th, 2026, when Node 20 is removed from the runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - uses: extractions/setup-just@v2

      - name: Install dependencies
        run: uv sync

      # Pre-commit logic is defined in the Justfile `precommit` target — do not add steps here.
      - name: Validate project
        run: just precommit
